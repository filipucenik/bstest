<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Assistant - Bootstrap Version</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
</head>
<body class="bg-light">

    <div id="login-page" class="d-flex align-items-center vh-100">
        <div class="container bg-white shadow-lg p-5 rounded-4" style="max-width: 500px;">
            <h1 class="text-center mb-4 text-primary fw-bold">Study Assistant</h1>
            <div class="mb-3">
                <input type="email" class="form-control form-control-lg" placeholder="Email address">
            </div>
            <div class="mb-3">
                <input type="password" class="form-control form-control-lg" placeholder="Password">
            </div>
            <button class="btn btn-dark btn-lg w-100 mb-3" onclick="showPage('main-menu')">Login</button>
            <div class="text-center">
                <p>Don't have an account? 
                <button class="btn btn-dark btn-lg w-100 mb-3" onclick="showPage('signup-page')">Sign up</button></p>
            </div>
        </div>
    </div>

    <div id="signup-page" class="d-none d-flex align-items-center vh-100">
        <div class="container bg-white shadow-lg p-5 rounded-4 position-relative" style="max-width: 500px;">
            <button class="btn btn-outline-secondary btn-sm position-absolute top-0 start-0 m-3" onclick="showPage('login-page')">← Back</button>
            <h1 class="text-center mb-4 text-primary fw-bold">Sign Up</h1>
            <div class="mb-3 text-start">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" placeholder="name@example.com">
            </div>
            <div class="mb-3 text-start">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" placeholder="Create password">
            </div>
            <div class="mb-3 text-start">
                <label class="form-label">Repeat Password</label>
                <input type="password" class="form-control" placeholder="Repeat password">
            </div>
            <button class="btn btn-dark btn-lg w-100" onclick="showPage('main-menu')">Create Account</button>
        </div>
    </div>

    <div id="main-menu" class="d-none p-4 vh-100">
        <div class="container bg-white shadow-lg h-100 rounded-4 p-4 position-relative overflow-hidden">
            <button class="btn btn-outline-danger btn-sm position-absolute top-0 start-0 m-3" onclick="showPage('login-page')">← Logout</button>
            
            <h1 class="text-center mb-4">Main Menu</h1>
            
            <div class="row h-75">
                <div class="col-md-6 h-100">
                    <div class="card h-100 border-0 bg-light p-3">
                        <h4 class="card-title">Assistant Chat</h4>
                        <textarea id="chat-input" class="form-control mb-2 flex-grow-1" placeholder="Type your question..."></textarea>
                        <button class="btn btn-dark text-white w-25 align-self-end" onclick="simulateResponse()">Send</button>
                        <div id="chat-output" class="mt-3 p-3 bg-white rounded border" style="min-height: 100px;">
                            Waiting for your message...
                        </div>
                    </div>
                </div>

                <div class="col-md-6 h-100">
                    <div class="card h-100 border-0 bg-light p-3">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h4 class="m-0">Your Notes</h4>
                            <div>
                                <button class="btn btn-primary btn-sm px-3" onclick="addNote()">+</button>
                                <button class="btn btn-danger btn-sm px-3" onclick="removeNote()">-</button>
                            </div>
                        </div>
                        <div id="notes-list" class="overflow-auto pe-2">
                            </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="left"></div>
<div class="right"></div>

    <script>
        function showPage(id) {
            // Sakriva sva tri kontejnera//
            document.getElementById('login-page').classList.add('d-none');
            document.getElementById('signup-page').classList.add('d-none');
            document.getElementById('main-menu').classList.add('d-none');
            
           
            const target = document.getElementById(id);
            target.classList.remove('d-none');
            if(id !== 'login-page') target.classList.add('d-flex');
        }

        function simulateResponse() {
            const input = document.getElementById('chat-input').value;
            const output = document.getElementById('chat-output');
            if(input.trim()) {
                output.innerHTML = `<strong>Assistant:</strong> To je sjajno pitanje o "${input}"! Evo šta sam pronašao... <br> <small class="text-muted">Tip: Koristite prečicu Ctrl+S za čuvanje.</small>`;
            }
        }

        function addNote() {
            const list = document.getElementById('notes-list');
            const div = document.createElement('div');
            div.className = "input-group mb-2 shadow-sm animate-fade";
            div.innerHTML = `<input type="text" class="form-control" placeholder="New task detail...">`;
            list.appendChild(div);
        }

        function removeNote() {
            const list = document.getElementById('notes-list');
            if(list.lastChild) list.removeChild(list.lastChild);
        }
    </script>
</body>
</html>
